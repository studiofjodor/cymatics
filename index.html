<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYMATICS — Sound Made Visible</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body, html {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #fff;
    }
    #canvas-container { position: fixed; inset: 0; z-index: 0; }
    canvas { display: block; width: 100% !important; height: 100% !important; }

    /* ── Bottom Bar ── */
    #ui {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
      padding: 28px 36px;
      display: flex; align-items: flex-end; justify-content: space-between; gap: 32px;
      background: linear-gradient(to top, rgba(0,0,0,0.90) 0%, transparent 100%);
      pointer-events: none;
    }
    #ui-left { pointer-events: all; display: flex; flex-direction: column; gap: 14px; }
    #wordmark { font-size: 11px; font-weight: 500; letter-spacing: 0.35em; text-transform: uppercase; color: rgba(255,255,255,0.28); }
    #upload-btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 12px 22px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 40px; color: rgba(255,255,255,0.75);
      font-size: 13px; letter-spacing: 0.04em; cursor: pointer;
      transition: background 200ms, border-color 200ms;
    }
    #upload-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.28); }
    #upload-btn svg { flex-shrink: 0; opacity: 0.6; }
    #file-input { display: none; }
    audio#player {
      pointer-events: all; height: 32px; width: 260px;
      opacity: 0.55; filter: invert(1); border-radius: 20px;
    }

    /* ── Controls Group (both sliders) ── */
    #controls {
      pointer-events: all;
      display: flex;
      gap: 32px;
      align-items: flex-end;
    }

    .ctrl-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .ctrl-label {
      font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.28); text-align: center;
    }
    .ctrl-value {
      font-size: 20px; font-weight: 200; letter-spacing: 0.04em;
      color: rgba(255,255,255,0.82);
      font-variant-numeric: tabular-nums;
      min-width: 38px; text-align: center;
      line-height: 1;
    }

    /* Slider base */
    .ctrl-slider {
      -webkit-appearance: none; appearance: none;
      width: 130px; height: 2px;
      background: transparent; outline: none; cursor: pointer;
    }
    .ctrl-slider::-webkit-slider-runnable-track {
      height: 2px; border-radius: 2px;
      background: rgba(255,255,255,0.10);
    }
    .ctrl-slider::-moz-range-track {
      height: 2px; border-radius: 2px;
      background: rgba(255,255,255,0.10);
    }
    .ctrl-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px; border-radius: 50%; background: #fff; margin-top: -6px;
      transition: box-shadow 150ms;
    }
    .ctrl-slider::-moz-range-thumb {
      width: 14px; height: 14px; border: none; border-radius: 50%; background: #fff;
    }

    /* Threshold thumb: purple glow */
    #thresh-slider::-webkit-slider-thumb {
      box-shadow: 0 0 10px rgba(160,80,255,0.9), 0 0 22px rgba(160,80,255,0.45);
    }
    #thresh-slider:hover::-webkit-slider-thumb {
      box-shadow: 0 0 16px rgba(160,80,255,1.0), 0 0 32px rgba(160,80,255,0.6);
    }
    #thresh-slider::-moz-range-thumb { box-shadow: 0 0 10px rgba(160,80,255,0.9); }

    /* Sensitivity thumb: cyan glow */
    #sens-slider::-webkit-slider-thumb {
      box-shadow: 0 0 10px rgba(0,200,255,0.9), 0 0 22px rgba(0,200,255,0.45);
    }
    #sens-slider:hover::-webkit-slider-thumb {
      box-shadow: 0 0 16px rgba(0,200,255,1.0), 0 0 32px rgba(0,200,255,0.6);
    }
    #sens-slider::-moz-range-thumb { box-shadow: 0 0 10px rgba(0,200,255,0.9); }

    /* Filled track */
    .track-wrap {
      position: relative; width: 130px; height: 2px;
      border-radius: 2px; background: rgba(255,255,255,0.09);
      margin-bottom: -2px;
    }
    .track-fill {
      position: absolute; top:0; left:0; height:100%;
      border-radius: 2px; pointer-events: none;
      transition: width 60ms;
    }
    #thresh-fill { background: linear-gradient(to right, #5533ff, #a040ff); }
    #sens-fill   { background: linear-gradient(to right, #0088cc, #00d4ff); }

    .slider-ticks {
      display: flex; justify-content: space-between; width: 130px;
    }
    .slider-tick { font-size: 8px; letter-spacing: 0.08em; color: rgba(255,255,255,0.18); }

    /* Divider between sliders */
    .ctrl-divider {
      width: 1px; height: 60px;
      background: rgba(255,255,255,0.08);
      align-self: center;
    }

    /* ── Frequency Bands ── */
    #bands { pointer-events: none; display: flex; flex-direction: column; align-items: flex-end; gap: 7px; }
    .band-row { display: flex; align-items: center; gap: 10px; }
    .band-label { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.22); width: 40px; text-align: right; }
    .band-bar-track { width: 110px; height: 2px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
    .band-bar-fill { height: 100%; border-radius: 2px; width: 0%; transition: width 70ms linear; }
    #fill-bass { background: #ff3a60; }
    #fill-mid  { background: #9933ff; }
    #fill-high { background: #33bfff; }

    /* ── Stereo Indicator ── */
    #stereo {
      position: fixed; top: 50%; right: 28px; transform: translateY(-50%);
      z-index: 10; pointer-events: none;
      display: flex; flex-direction: column; align-items: center; gap: 7px;
    }
    #stereo-label { font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.18); }
    #stereo-track { width: 2px; height: 120px; background: rgba(255,255,255,0.07); border-radius: 2px; position: relative; }
    #stereo-center { width: 6px; height: 1px; background: rgba(255,255,255,0.18); position: absolute; left: -2px; top: 50%; }
    #stereo-fill {
      position: absolute; left: 0; right: 0;
      background: linear-gradient(to top, #33bfff, #9933ff);
      border-radius: 2px; transition: top 90ms, height 90ms; top: 50%; height: 0%;
    }

    /* ── Beat Flash ── */
    #beat-flash {
      position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: 0;
      background: radial-gradient(ellipse at center, rgba(160,60,255,0.16) 0%, transparent 70%);
      transition: opacity 80ms;
    }

    /* ── Hint ── */
    #hint {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      text-align: center; pointer-events: none; z-index: 5; transition: opacity 1.2s;
    }
    #hint h1 { font-size: 11px; font-weight: 400; letter-spacing: 0.42em; text-transform: uppercase; color: rgba(255,255,255,0.14); margin-bottom: 10px; }
    #hint p { font-size: 10px; letter-spacing: 0.14em; color: rgba(255,255,255,0.08); text-transform: uppercase; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

<div id="canvas-container"></div>
<div id="beat-flash"></div>

<div id="hint">
  <h1>Cymatics</h1>
  <p>Sound Made Visible</p>
</div>

<div id="stereo">
  <div id="stereo-label">L &nbsp; R</div>
  <div id="stereo-track">
    <div id="stereo-center"></div>
    <div id="stereo-fill"></div>
  </div>
</div>

<div id="ui">

  <!-- Left: Upload + Player -->
  <div id="ui-left">
    <span id="wordmark">Cymatics / Sound Made Visible</span>
    <label id="upload-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Audio laden (.mp3 / .wav)
      <input type="file" id="file-input" accept="audio/*">
    </label>
    <audio id="player" controls></audio>
  </div>

  <!-- Center: Both Sliders -->
  <div id="controls">

    <!-- Sensitivity -->
    <div class="ctrl-block">
      <span class="ctrl-label">Sensitivity</span>
      <div class="ctrl-value" id="sens-display">0.50</div>
      <div class="track-wrap">
        <div class="track-fill" id="sens-fill" style="width:50%"></div>
      </div>
      <input type="range" class="ctrl-slider" id="sens-slider" min="5" max="100" value="50" step="1">
      <div class="slider-ticks">
        <span class="slider-tick">Schwach</span>
        <span class="slider-tick">Voll</span>
      </div>
    </div>

    <div class="ctrl-divider"></div>

    <!-- Beat Threshold -->
    <div class="ctrl-block">
      <span class="ctrl-label">Beat Threshold</span>
      <div class="ctrl-value" id="thresh-display">0.55</div>
      <div class="track-wrap">
        <div class="track-fill" id="thresh-fill" style="width:55%"></div>
      </div>
      <input type="range" class="ctrl-slider" id="thresh-slider" min="10" max="95" value="55" step="1">
      <div class="slider-ticks">
        <span class="slider-tick">Sensitiv</span>
        <span class="slider-tick">Hart</span>
      </div>
    </div>

  </div>

  <!-- Right: Frequency Bands -->
  <div id="bands">
    <div class="band-row"><span class="band-label">Bass</span><div class="band-bar-track"><div class="band-bar-fill" id="fill-bass"></div></div></div>
    <div class="band-row"><span class="band-label">Mid</span><div class="band-bar-track"><div class="band-bar-fill" id="fill-mid"></div></div></div>
    <div class="band-row"><span class="band-label">High</span><div class="band-bar-track"><div class="band-bar-fill" id="fill-high"></div></div></div>
  </div>

</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ─── Slider Controls ─────────────────────────────────────────────────────────
let THRESH = 0.55;   // beat detection crossing point
let SENS   = 0.50;   // global multiplier on all band values → controls color range

const threshSlider  = document.getElementById('thresh-slider');
const threshDisplay = document.getElementById('thresh-display');
const threshFill    = document.getElementById('thresh-fill');

const sensSlider    = document.getElementById('sens-slider');
const sensDisplay   = document.getElementById('sens-display');
const sensFill      = document.getElementById('sens-fill');

threshSlider.addEventListener('input', () => {
  THRESH = parseInt(threshSlider.value) / 100;
  threshDisplay.textContent = THRESH.toFixed(2);
  threshFill.style.width = threshSlider.value + '%';
});

sensSlider.addEventListener('input', () => {
  SENS = parseInt(sensSlider.value) / 100;
  sensDisplay.textContent = SENS.toFixed(2);
  sensFill.style.width = sensSlider.value + '%';
});

// ─── Audio ──────────────────────────────────────────────────────────────────
let audioCtx, analyserL, analyserR, dataL, dataR;
let isReady = false;
let sBass=0, sMid=0, sHigh=0, sPan=0, prevBass=0, shockwave=0;

const player    = document.getElementById('player');
const fileInput = document.getElementById('file-input');
const hint      = document.getElementById('hint');
const beatFlash = document.getElementById('beat-flash');

fileInput.addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  player.src = URL.createObjectURL(f);
  player.play();
  hint.style.opacity = '0';
});
player.addEventListener('play', () => { if (!audioCtx) initAudio(); });

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const src = audioCtx.createMediaElementSource(player);
  const spl = audioCtx.createChannelSplitter(2);
  src.connect(spl);
  analyserL = audioCtx.createAnalyser(); analyserL.fftSize = 2048; analyserL.smoothingTimeConstant = 0.78;
  analyserR = audioCtx.createAnalyser(); analyserR.fftSize = 2048; analyserR.smoothingTimeConstant = 0.78;
  spl.connect(analyserL, 0); spl.connect(analyserR, 1);
  src.connect(audioCtx.destination);
  dataL = new Uint8Array(analyserL.frequencyBinCount);
  dataR = new Uint8Array(analyserR.frequencyBinCount);
  isReady = true;
}

function avg(arr, a, b) { let s=0; for(let i=a;i<b;i++) s+=arr[i]; return s/(b-a)/255; }
function lerp(a, b, t)  { return a+(b-a)*t; }

// ─── Renderer ───────────────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer  = new THREE.WebGLRenderer({ antialias:false, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.25;
container.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 500);
camera.position.set(0, 0, 32);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.04;
controls.enablePan=false; controls.minDistance=12; controls.maxDistance=80;
controls.autoRotate=true; controls.autoRotateSpeed=0.3;

// ─── Post-processing ────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.6, 0.42, 0.1);
composer.addPass(bloom);

// ─── Fibonacci Sphere Particles ─────────────────────────────────────────────
const N   = 80000;
const pos = new Float32Array(N * 3);
const nor = new Float32Array(N * 3);
const rnd = new Float32Array(N);
const PHI = Math.PI * (3 - Math.sqrt(5));
const R0  = 9.0;

for (let i = 0; i < N; i++) {
  const y  = 1 - (i / (N-1)) * 2;
  const r  = Math.sqrt(Math.max(0, 1 - y*y));
  const th = PHI * i;
  const nx = Math.cos(th)*r, ny = y, nz = Math.sin(th)*r;
  nor[i*3]=nx; nor[i*3+1]=ny; nor[i*3+2]=nz;
  pos[i*3]=nx*R0; pos[i*3+1]=ny*R0; pos[i*3+2]=nz*R0;
  rnd[i] = Math.random();
}

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
geo.setAttribute('aNormal',  new THREE.BufferAttribute(nor, 3));
geo.setAttribute('aRandom',  new THREE.BufferAttribute(rnd, 1));

// ─── Shaders ────────────────────────────────────────────────────────────────
const vert = `
precision highp float;
uniform float uTime, uBass, uMid, uHigh, uPan, uShockwave, uBaseR;
attribute vec3 aNormal;
attribute float aRandom;
varying float vDisp, vPan;

vec3 mod289(vec3 x){return x-floor(x*(1./289.))*289.;}
vec4 mod289(vec4 x){return x-floor(x*(1./289.))*289.;}
vec4 permute(vec4 x){return mod289(((x*34.)+1.)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){
  const vec2 C=vec2(1./6.,1./3.); const vec4 D=vec4(0.,.5,1.,2.);
  vec3 i=floor(v+dot(v,C.yyy)); vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz); vec3 l=1.-g;
  vec3 i1=min(g.xyz,l.zxy); vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx; vec3 x2=x0-i2+C.yyy; vec3 x3=x0-D.yyy;
  i=mod289(i);
  vec4 p=permute(permute(permute(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));
  float n_=.142857142857; vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z); vec4 y_=floor(j-7.*x_);
  vec4 x=x_*ns.x+ns.yyyy; vec4 y=y_*ns.x+ns.yyyy; vec4 h=1.-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy); vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.+1.; vec4 s1=floor(b1)*2.+1.;
  vec4 sh=-step(h,vec4(0.));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy; vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x); vec3 p1=vec3(a0.zw,h.y); vec3 p2=vec3(a1.xy,h.z); vec3 p3=vec3(a1.zw,h.w);
  vec4 norm2=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm2.x; p1*=norm2.y; p2*=norm2.z; p3*=norm2.w;
  vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);
  m=m*m;
  return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}

void main(){
  vec3 n=normalize(aNormal);
  float t=uTime*0.22;
  float n1=snoise(n*(0.85+uMid*1.3)+vec3(t,t*0.65,t*0.4));
  float n2=snoise(n*(2.1+uHigh*1.8)+vec3(-t*0.55,t*1.1,aRandom*4.));
  float n3=snoise(n*4.5+vec3(aRandom,t*0.3,t*0.8));
  float disp=uBass*5.8+n1*uMid*4.2+n2*uHigh*2.8+n3*0.3;
  float waveFront=1.0-uShockwave;
  float ring=smoothstep(0.2,0.0,abs(n.y-(waveFront*2.-1.)))*uShockwave*7.0;
  disp+=ring;
  disp+=uPan*2.8*n.x;
  vDisp=disp; vPan=uPan;
  vec3 p=n*(uBaseR+disp);
  vec4 mv=modelViewMatrix*vec4(p,1.);
  float energy=0.45+uBass*1.6+uHigh*1.3;
  gl_PointSize=clamp(energy*(300./-mv.z),0.4,6.5);
  gl_Position=projectionMatrix*mv;
}
`;

const frag = `
precision highp float;
uniform float uBass, uHigh, uPan;
varying float vDisp, vPan;

void main(){
  vec2 uv=gl_PointCoord-0.5;
  float d=length(uv);
  if(d>0.5) discard;
  float alpha=smoothstep(0.5,0.06,d);
  float t=clamp(vDisp/9.5,0.,1.);
  vec3 c0=vec3(0.03,0.04,0.20);
  vec3 c1=vec3(0.04,0.48,0.95);
  vec3 c2=vec3(0.90,0.04,0.58);
  vec3 c3=vec3(1.0,0.88,1.0);
  vec3 col;
  if(t<0.33)      col=mix(c0,c1,t/0.33);
  else if(t<0.70) col=mix(c1,c2,(t-0.33)/0.37);
  else            col=mix(c2,c3,(t-0.70)/0.30);
  if(vPan< -0.1) col=mix(col,vec3(0.0,0.25,0.9),min(-vPan*0.5,0.38));
  else if(vPan>0.1) col=mix(col,vec3(1.0,0.38,0.0),min(vPan*0.5,0.38));
  col+=vec3(uHigh*0.55);
  gl_FragColor=vec4(col,alpha*0.90);
}
`;

const mat = new THREE.ShaderMaterial({
  vertexShader: vert, fragmentShader: frag,
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
  uniforms: {
    uTime:{value:0}, uBass:{value:0}, uMid:{value:0}, uHigh:{value:0},
    uPan:{value:0},  uShockwave:{value:0}, uBaseR:{value:R0}
  }
});
scene.add(new THREE.Points(geo, mat));

// ─── UI refs ────────────────────────────────────────────────────────────────
const fillB = document.getElementById('fill-bass');
const fillM = document.getElementById('fill-mid');
const fillH = document.getElementById('fill-high');
const sFill = document.getElementById('stereo-fill');

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Beat Flash ──────────────────────────────────────────────────────────────
let flashTimeout = null;
function triggerFlash() {
  beatFlash.style.opacity = '1';
  if (flashTimeout) clearTimeout(flashTimeout);
  flashTimeout = setTimeout(() => { beatFlash.style.opacity = '0'; }, 80);
}

// ─── Animate ─────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function tick() {
  requestAnimationFrame(tick);
  const el = clock.getElapsedTime();

  let rawBass=0, rawMid=0, rawHigh=0, pan=0;

  if (isReady) {
    analyserL.getByteFrequencyData(dataL);
    analyserR.getByteFrequencyData(dataR);
    const comb = new Uint8Array(dataL.length);
    let tL=0, tR=0;
    for (let i=0; i<comb.length; i++) {
      comb[i] = (dataL[i]+dataR[i]) * 0.5;
      tL += dataL[i]; tR += dataR[i];
    }
    rawBass = avg(comb, 1,  8);
    rawMid  = avg(comb, 8,  80);
    rawHigh = avg(comb, 80, 300);
    const tot = tL + tR;
    pan = tot > 0 ? (tR - tL) / tot : 0;

    // Beat detection uses RAW bass vs THRESH (unaffected by sensitivity)
    if (rawBass > THRESH && prevBass <= THRESH) {
      shockwave = 1.0;
      triggerFlash();
    }
    prevBass = rawBass;
  }

  // Smooth raw values
  sBass = lerp(sBass, rawBass, 0.12);
  sMid  = lerp(sMid,  rawMid,  0.12);
  sHigh = lerp(sHigh, rawHigh, 0.15);
  sPan  = lerp(sPan,  pan,     0.07);
  shockwave *= 0.93;

  // Apply SENSITIVITY as multiplier before sending to shader
  // This compresses the full band range so the color palette stays visible
  const scaledBass = Math.min(sBass * SENS * 2.0, 1.0);
  const scaledMid  = Math.min(sMid  * SENS * 2.0, 1.0);
  const scaledHigh = Math.min(sHigh * SENS * 2.0, 1.0);

  mat.uniforms.uTime.value      = el;
  mat.uniforms.uBass.value      = scaledBass;
  mat.uniforms.uMid.value       = scaledMid;
  mat.uniforms.uHigh.value      = scaledHigh;
  mat.uniforms.uPan.value       = sPan;
  mat.uniforms.uShockwave.value = shockwave;

  bloom.strength = 1.8 + scaledBass * 2.4;
  bloom.radius   = 0.30 + scaledMid  * 0.32;

  controls.autoRotateSpeed = 0.25 + scaledBass * 1.6;
  controls.update();

  // Frequency meters show RAW values (pre-sensitivity) so user can see true signal
  fillB.style.width = (sBass * 100).toFixed(1) + '%';
  fillM.style.width = (sMid  * 100).toFixed(1) + '%';
  fillH.style.width = (sHigh * 100).toFixed(1) + '%';

  const barH = Math.abs(sPan) * 48;
  if (sPan >= 0) { sFill.style.top = (50-barH)+'%'; sFill.style.height = barH+'%'; }
  else           { sFill.style.top = '50%';          sFill.style.height = barH+'%'; }

  composer.render();
}
tick();
</script>
</body>
</html>
